<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WxCC Agent Desktop Queue Threshold Dashboard</title>
    <link rel="stylesheet" href="./src/index.css" />
    <script src="/local-config.js"></script>
    <script type="module" src="/src/my-element.ts"></script>
  </head>
  <body>
    <script>
      const config = window.LOCAL_CONFIG || {}
      const widget = document.createElement('queue-threshold-dashboard')

      widget.setAttribute('token', config.token || '')
      widget.setAttribute('refresh-ms', String(config.refreshMs ?? 30000))
      widget.setAttribute(
        'search-url',
        config.searchUrl || 'https://api.wxcc-us1.cisco.com/search'
      )
      widget.setAttribute('status-filter', config.statusFilter || 'parked')
      widget.setAttribute('darkmode', String(Boolean(config.darkmode)))

      document.body.appendChild(widget)
    </script>

  </body>
</html>
